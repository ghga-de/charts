---
# Source: my-app/templates/kafkauser.yml
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  labels:
    strimzi.io/cluster: kafka
  name: test-test-my-app
  namespace: strimzi
spec:
  authentication:
    type: tls
  authorization:
    acls:
    - operations:
      - Write
      - Describe
      - Create
      resource:
        name: baz
        patternType: literal
        type: topic
    - operations:
      - Read
      resource:
        name: ""
        patternType: literal
        type: group
    type: simple
  template:
    secret:
      metadata:
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: test
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"

