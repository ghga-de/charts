podAnnotations:
  vault.hashicorp.com/agent-cache-enable: "true"
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-pre-populate-only: "false"
  vault.hashicorp.com/agent-run-as-same-user: "true"
  vault.hashicorp.com/tls-skip-verify: "false"
  vault.hashicorp.com/role: "test-my-app"
  vault.hashicorp.com/agent-inject-command-crypt4ghInternalPub: |
    kill -TERM $(pgrep python)
  vault.hashicorp.com/agent-inject-file-crypt4ghInternalPub: /vault/secrets/internal.pub
  vault.hashicorp.com/agent-inject-template-crypt4ghInternalPub: |
    {{ with secret "secret/data/crypt4gh/keys" -}}
    {{ index .Data.data "internal_pub" }}
    {{- end }}
  vault.hashicorp.com/agent-inject-command-service-secrets: |
    kill -TERM $(pgrep python)
  vault.hashicorp.com/agent-inject-secret-service-secrets: default-mongodb-mongodb/creds/test-my-app
  vault.hashicorp.com/agent-inject-template-service-secrets: |
    {{- with secret "default-mongodb-mongodb/creds/test-my-app" -}}
    MONGO_DSN="mongodb://{{username}}:{{password}}@mongodb:27017/admin"
    {{- end }}
    {{ with secret "operational-secrets/data/unique/apps/archive/default/test-my-app" -}}
    {{ if .Data.data }}{{- range $k, $v := .Data.data }}
    {{ $k }}='{{ $v }}'
    {{- end }}{{- end }}{{- end }}
    {{ with secret "secret/data/crypt4gh/keys" -}}
    C4GH_INTERNAL_KEY='{{ index .Data.data "internal_priv" }}'
    {{- end }}
    {{ with secret "secret/data/apps/api" -}}
    API_TOKEN='{{ index .Data.data "token" }}'
    {{- end }}
    {{ with secret "secret/data/apps/license" -}}
    LICENSE_KEY='{{ index .Data.data "license_key" }}'
    {{- end }}
    {{- with secret "test-append" -}}
    test-append="{{ .Data.data.value }}"
    {{- end -}}

command:
- /usr/local/bin/sleep
args:
- 100000000
